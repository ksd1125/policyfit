<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>정책공고 AI</title>
<meta name="description" content="소상공인·중소기업 지원사업 검색 AI 챗봇">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&display=swap">
<style>
:root {
  --accent: #2D4540;
  --accent-soft: rgba(45,69,64,.08);
  --bg-warm: #F5F2EC;
  --bg-soft: #FAF7F1;
  --surface: #ffffff;
  --text: #1A1916;
  --text-sec: #3a4540;
  --muted: #6F6B62;
  --subtle: #7A756C;
  --line: #E8E3D7;
  --line-strong: #D5CFC3;
  --up: #4F7A5E;
  --warn: #8c5a12;
  --down: #A84B40;
  --radius-xs: 8px;
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-pill: 999px;
  --shadow-sm: 0 1px 3px rgba(30,40,30,.04), 0 1px 2px rgba(30,40,30,.02);
  --shadow-md: 0 4px 16px rgba(30,40,30,.06), 0 1px 4px rgba(30,40,30,.03);
  --ease: cubic-bezier(.22,.68,0,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard Variable",-apple-system,"Noto Sans KR",sans-serif;background:var(--bg-warm);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}

.app{max-width:720px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}

/* ── Header ── */
.top-bar{padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg-warm);z-index:5}
.persona-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#E1E8E4,#d4eae0);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.top-title-wrap{display:flex;flex-direction:column;line-height:1.25}
.top-title{font-size:15px;font-weight:700;color:var(--text)}
.top-sub{font-size:11.5px;color:var(--up);display:flex;align-items:center;gap:4px}
.top-sub::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--up);display:inline-block}
.top-reset{margin-left:auto;font-size:12px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:var(--radius-pill);padding:5px 11px;cursor:pointer}
.top-reset:hover{border-color:var(--accent);color:var(--accent)}

/* ── 상단 맥락 바 ── */
.context-bar{position:sticky;top:61px;z-index:4;background:var(--bg-warm);padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;border-bottom:1px solid var(--line)}
.context-bar .ctx-label{font-size:11px;color:var(--muted);margin-right:2px}
.context-bar .slot-badge{margin:0}

/* ── Chat area (상단 정렬, 공백 제거) ── */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;justify-content:flex-start}

/* ── Welcome = 봇 첫 인사 ── */
.welcome{transition:opacity .35s var(--ease)}
.welcome.hidden{display:none}
.welcome-greeting{animation:chatIn .4s ease-out both}
.greet-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.greet-desc{font-size:13.5px;color:var(--text-sec);margin-bottom:14px;line-height:1.55}
.scenario-grid{display:grid;grid-template-columns:1fr;gap:8px;text-align:left;margin-bottom:4px}
.scenario-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text-sec);transition:all .2s var(--ease);line-height:1.35}
.scenario-btn:hover,.scenario-btn:focus-visible{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);box-shadow:var(--shadow-sm);transform:translateY(-1px);outline:none}
.scenario-icon{font-size:20px;flex-shrink:0}
.scenario-text{display:flex;flex-direction:column;gap:1px}
.scenario-label{font-weight:600}
.scenario-sub{font-size:11.5px;color:var(--subtle);font-weight:400}

/* ── Explore section (탐색 진입) ── */
.explore-section{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
.explore-title{font-size:12.5px;color:var(--muted);margin-bottom:10px;cursor:pointer;list-style:none;font-weight:500}
.explore-title::-webkit-details-marker{display:none}
.explore-title::after{content:' ▾';opacity:.5}
details[open] .explore-title::after{content:' ▴'}
.explore-grid{display:flex;flex-wrap:wrap;gap:7px}
.explore-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-pill);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-sec);transition:all .2s var(--ease)}
.explore-btn:hover,.explore-btn:focus-visible{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);outline:none}

/* ── Browse / facet ── */
.browse-stat{font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.6}
.browse-stat b{color:var(--accent)}
.facet-axis{margin-bottom:12px}
.facet-axis-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px}
.facet-chips{display:flex;flex-wrap:wrap;gap:6px}
.facet-chip{display:inline-flex;align-items:center;gap:3px;padding:5px 11px;border-radius:var(--radius-pill);background:var(--surface);border:1px solid var(--line);font-size:12px;cursor:pointer;color:var(--text-sec);transition:all .15s}
.facet-chip:hover{border-color:var(--accent);color:var(--accent)}
.facet-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.facet-chip .cnt{opacity:.6;font-size:11px}
.facet-chip.on .cnt{opacity:.85}
.compare-diff{background:#FEF3C7 !important}

/* ── 결과 그룹 헤더 ── */
.group-head{font-size:13px;font-weight:700;margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.group-head.g1{color:var(--up)}
.group-head.g2{color:var(--warn)}
.group-head.g3{color:var(--muted)}
.group-sub{font-size:11.5px;font-weight:400;color:var(--subtle)}
.final-note{font-size:11.5px;color:var(--subtle);margin-top:10px;padding:8px 10px;background:var(--bg-soft);border-radius:8px;line-height:1.5}
.card-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.card-act{font-size:12px;padding:6px 11px;border-radius:var(--radius-pill);border:1px solid var(--line);background:var(--surface);color:var(--text-sec);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.card-act:hover{border-color:var(--accent);color:var(--accent)}
.card-act.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.data-source{font-size:11px;color:var(--subtle);margin-top:12px;padding-top:10px;border-top:1px solid var(--line);line-height:1.5}

/* ── Chat rows ── */
.chat-row{display:flex;gap:10px;max-width:680px;animation:chatIn .35s ease-out both}
@keyframes chatIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chat-row.user{align-self:flex-end;flex-direction:row-reverse}

.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.avatar.bot{background:linear-gradient(135deg,#E1E8E4,#d4eae0);color:var(--accent)}
.avatar.user{background:linear-gradient(135deg,#f8efe1,#f0e2cc);color:#7a6540}
/* 연속 봇 메시지는 아바타 숨겨 정렬 유지 */
.chat-row.bot + .chat-row.bot .avatar.bot{visibility:hidden}
/* 공고 자유 추출 패널 */
.extract-box{margin-top:10px;padding:10px 12px;background:var(--bg-soft);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:13px;color:var(--text-sec);line-height:1.6;white-space:pre-line}
.extract-q{font-size:11.5px;font-weight:600;color:var(--accent);margin-bottom:3px}
.ask-topics{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ask-topic{font-size:12px;padding:5px 11px;border-radius:var(--radius-pill);border:1px solid var(--line);background:var(--surface);color:var(--text-sec);cursor:pointer}
.ask-topic:hover{border-color:var(--accent);color:var(--accent)}
/* 비교표 토글 */
.compare-toggle{margin:6px 0 4px}
.compare-toggle summary{font-size:12.5px;color:var(--accent);cursor:pointer;list-style:none;font-weight:500;padding:6px 0}
.compare-toggle summary::-webkit-details-marker{display:none}
.compare-toggle summary::after{content:' ▾';opacity:.6}
.compare-toggle[open] summary::after{content:' ▴'}

.bubble{padding:14px 18px;font-size:14px;line-height:1.6;word-break:keep-all}
.bubble.user{background:var(--accent);color:#fff;border-radius:18px 18px 4px 18px;font-weight:500;max-width:70%;box-shadow:0 2px 12px rgba(24,96,73,.12)}
.bubble.bot{flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:4px 18px 18px 18px;box-shadow:var(--shadow-sm)}

/* ── Bot meta ── */
.bot-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--muted)}
.meta-dot{width:7px;height:7px;border-radius:50%;background:var(--up);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(79,122,94,.1)}50%{box-shadow:0 0 0 6px rgba(79,122,94,.18)}}
.meta-badge{padding:2px 8px;border-radius:var(--radius-pill);background:var(--accent-soft);color:var(--accent);font-weight:600;font-size:11px}

.bot-narrative{color:var(--text-sec);margin-bottom:14px;font-size:14px}

/* ── Result cards (균일 높이) ── */
.card{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;transition:all .2s var(--ease)}
.card:hover{border-color:var(--line-strong);box-shadow:var(--shadow-sm)}
.card-title{font-size:14.5px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:8px;cursor:pointer;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px}
.card-title:hover{color:var(--accent)}
.card-summary{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:10px}

.card-glance{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:10px;min-height:48px;align-content:start}
.glance-item{display:flex;align-items:baseline;gap:6px;font-size:13px;min-width:0}
.glance-item.eligibility{grid-column:1/-1}
.glance-item.eligibility .glance-val{white-space:normal;overflow:visible;text-overflow:clip}
.glance-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.glance-label{color:var(--muted);font-size:11.5px;flex-shrink:0}
.glance-val{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.glance-val.highlight{color:var(--accent);font-weight:600}
.glance-val.warn{color:var(--down);font-weight:600}

.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;height:50px;overflow:hidden;align-content:flex-start}
.tag{display:inline-flex;padding:3px 8px;border-radius:var(--radius-pill);font-size:11px;font-weight:500}
.tag-cat{background:#E8F0ED;color:#2D5545}
.tag-period{background:#FEF3C7;color:#92400E}
.tag-deadline{background:#FDE2E1;color:#A84B40;font-weight:600}
.tag-budget{background:#E0ECF4;color:#2D5090}
.tag-open{background:#E8F0ED;color:#2D5545}
.tag-purpose{background:#F0EDE5;color:#7A756C}
.tag-purpose-active{background:var(--accent);color:#fff;font-weight:600}
.tag-warn-grade{background:#FDF0E0;color:#92400e}

.card-toggle{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);cursor:pointer;font-weight:500;border:none;background:none;padding:4px 0}
.card-toggle:hover{text-decoration:underline}
.card-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.card-toggle .arrow{transition:transform .2s;display:inline-block}
.card-toggle.open .arrow{transform:rotate(180deg)}

.card-detail{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s var(--ease),opacity .2s;opacity:0}
.card-detail.open{grid-template-rows:1fr;opacity:1;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.card-detail-inner{overflow:hidden}
.detail-section{margin-bottom:12px}
.detail-q{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.detail-a{font-size:13px;color:var(--text-sec);line-height:1.6;white-space:pre-line}
.detail-src{font-size:10px;padding:1px 5px;border-radius:3px;background:#FEF3C7;color:#92400E;margin-left:4px}
.card-link{display:inline-block;margin-top:8px;font-size:12px;color:var(--accent);text-decoration:none;font-weight:500}
.card-link:hover{text-decoration:underline}

.more-btn{display:block;width:100%;padding:10px;border:1px dashed var(--line);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:13px;color:var(--muted);text-align:center;margin-top:4px;transition:all .15s}
.more-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Follow-up chips ── */
.followups{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(0,0,0,.04)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:var(--radius-pill);background:var(--surface);border:1px solid var(--line);font-size:13px;font-weight:500;color:var(--text-sec);cursor:pointer;transition:all .15s var(--ease)}
.chip:hover,.chip:focus-visible{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);outline:none}

/* ── Input area ── */
.input-area{padding:12px 16px 20px;background:var(--bg-warm);position:sticky;bottom:0}
.input-row{display:flex;gap:8px;align-items:flex-end;max-width:680px;margin:0 auto}
.input-row input{flex:1;min-height:48px;padding:12px 18px;border:1.5px solid var(--line-strong);border-radius:var(--radius-lg);background:var(--surface);font-size:14.5px;font-weight:450;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.input-row input:focus{border-color:var(--accent);box-shadow:var(--shadow-sm),0 0 0 3px rgba(45,69,64,.06)}
.input-row input::placeholder{color:var(--subtle)}
.send-btn{width:44px;height:44px;border-radius:var(--radius-pill);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease);flex-shrink:0}
.send-btn:hover:not(:disabled){transform:scale(1.04);box-shadow:0 4px 16px rgba(45,69,64,.2)}
.send-btn:active:not(:disabled){transform:scale(.96)}
.send-btn:disabled{background:#94a3b8;cursor:not-allowed;transform:none}
.send-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.send-btn svg{width:20px;height:20px}

/* ── Loading dots ── */
.thinking{display:flex;gap:5px;padding:8px 0}
.thinking span{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.3;animation:dot 1.4s ease-in-out infinite}
.thinking span:nth-child(2){animation-delay:.16s}
.thinking span:nth-child(3){animation-delay:.32s}
@keyframes dot{0%,80%,100%{opacity:.3;transform:scale(1)}40%{opacity:1;transform:scale(1.15)}}

/* ── Compare table ── */
.compare-table{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.compare-col{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 12px;display:flex;flex-direction:column;gap:6px;min-height:180px}
.compare-header{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;padding-bottom:8px;border-bottom:1px solid var(--line);min-height:48px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.compare-row{font-size:12.5px;color:var(--text-sec);display:flex;align-items:center;gap:5px}
.compare-row .ci{flex-shrink:0;width:16px;text-align:center;font-size:13px}
.compare-row .cv{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare-row .cv.hl{color:var(--accent);font-weight:600}
.compare-row .cv.warn{color:var(--down);font-weight:600}
.compare-detail{font-size:12px;color:var(--accent);cursor:pointer;border:none;background:none;padding:4px 0;margin-top:auto;font-weight:500;text-align:left}
.compare-detail:hover{text-decoration:underline}
.compare-best{position:relative}
.compare-best::before{content:'추천';position:absolute;top:-8px;right:8px;font-size:10px;padding:1px 6px;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-weight:600}

/* ── Slot badges ── */
.slot-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.slot-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--radius-pill);background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:600}
.slot-remove{border:none;background:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0 0 0 2px;opacity:.6}
.slot-remove:hover{opacity:1}

/* ── Gathering message ── */
.gather-q{font-size:14.5px;color:var(--text);font-weight:500;margin-bottom:12px}
.gather-progress{margin-left:auto;font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:1px 8px;border-radius:var(--radius-pill)}
.chip-nav{background:transparent;border-color:var(--line);color:var(--muted);font-size:12px;padding:5px 11px}
.slot-chips{display:flex;flex-wrap:wrap;gap:8px}

/* ── Responsive ── */
@media(max-width:600px){
  .scenario-grid{grid-template-columns:1fr}
  .bubble.user{max-width:85%}
  .card-glance{grid-template-columns:1fr}
  .compare-table{grid-template-columns:1fr;gap:8px}
  .compare-best::before{top:-6px;right:6px}
  .context-bar{top:60px}
}
@media print{.input-area,.followups,.welcome{display:none}.card-detail{grid-template-rows:1fr;opacity:1}}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <span class="persona-avatar">🧑‍💼</span>
    <span class="top-title-wrap">
      <span class="top-title">정책 상담 데스크</span>
      <span class="top-sub">상담원 이든 · 온라인</span>
    </span>
    <button class="top-reset" id="topReset" aria-label="새 상담" title="새 상담">＋ 새 상담</button>
  </div>

  <!-- 상단 맥락 바 (조건 확정 시 노출) -->
  <div class="context-bar" id="contextBar" hidden></div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="chat-row bot welcome-greeting">
        <div class="avatar bot">🧑‍💼</div>
        <div class="bubble bot">
          <p class="greet-title">안녕하세요, 상담원 <b>이든</b>이에요 👋</p>
          <p class="greet-desc">소상공인·중소기업 지원사업을 함께 찾아드릴게요. 어떤 도움이 필요하세요?</p>
          <div class="scenario-grid" id="scenarios"></div>
          <details class="explore-section" id="exploreDetails">
            <summary class="explore-title">다른 조건으로 둘러보기</summary>
            <div class="explore-grid" id="exploreEntries"></div>
          </details>
          <p class="data-source" id="dataSource">공식 출처 기업마당 · 2026-06-01 기준 795건을 정리했어요.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <label for="qInput" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">지원사업 검색</label>

function noticeText(n) {
  return [n.title,n.summary,n.target,n.category,n.subcategory,n.type,n.method,(n.documents||[]).join(' '),(n.exclusions||[]).join(' ')].filter(Boolean).join(' ').toLowerCase();
}

function matchesNoticeTerms(n, terms) {
  if (!terms || !terms.length) return true;
  const text = noticeText(n);
  return terms.some(term => text.includes(term.toLowerCase()));
}

function parseIntent(text) {
  const lower = text.toLowerCase();
  const intent = {target:null, need:null, region:null, category:null, purpose:null, fundType:null, profile:null, industry:null, qualification:null, businessAge:null, raw:text};

  // 1) 지역 추출
  for (const [alias, norm] of Object.entries(REGION_NORMALIZE)) {
    if (lower.includes(alias)) { intent.region = norm; break; }
  }
  if (!intent.region) {
    for (const r of REGIONS) { if (lower.includes(r)) { intent.region = r; break; } }
  }

  // 2) 업종 → 대상 추출
  for (const [industry, target] of Object.entries(INDUSTRY_TO_TARGET)) {
    if (lower.includes(industry)) { intent.target = target; break; }
  }
  // 직접 언급
  if (lower.includes('소상공인')) intent.target = '소상공인';
  if (lower.includes('중소기업')) intent.target = '중소기업';
  if (lower.includes('창업') || lower.includes('스타트업')) intent.target = '창업벤처';

  // 3) 업종·추가 자격 추출
  for (const [industry, terms] of Object.entries(INDUSTRY_FILTERS)) {
    if (terms.some(term => lower.includes(term.toLowerCase()))) { intent.industry = industry; break; }
  }
  for (const [qualification, terms] of Object.entries(QUALIFICATION_FILTERS)) {
    if (terms.some(term => lower.includes(term.toLowerCase()))) { intent.qualification = qualification; break; }
  }
  if (/예비\s*창업/.test(lower)) intent.businessAge = '예비창업';
  else if (/업력\s*1년\s*(미만|이내)/.test(lower)) intent.businessAge = '업력 1년 미만';
  else if (/업력\s*3년\s*(미만|이내)/.test(lower)) intent.businessAge = '업력 3년 미만';
  else if (/업력\s*7년\s*(미만|이내)/.test(lower)) intent.businessAge = '업력 7년 미만';
  if (intent.industry || intent.qualification || intent.businessAge) intent.profile = 'custom';

  // 4) 필요 → 카테고리 추출
  for (const [need, cat] of Object.entries(NEED_TO_CATEGORY)) {
    if (lower.includes(need)) { intent.need = need; intent.category = cat; break; }
  }
  // 직접 카테고리 언급
  if (lower.includes('금융')) intent.category = '금융';
  if (lower.includes('경영')) intent.category = '경영';
  if (lower.includes('내수')) intent.category = '내수';
  if (lower.includes('창업') && !intent.category) intent.category = '창업';

  // 5) 목적(用途) 축 추출 — 벤치마크 다축 구조의 핵심
  for (const [kw, purpose] of Object.entries(NEED_TO_PURPOSE)) {
    if (lower.includes(kw)) { intent.purpose = purpose; break; }
  }

  // 6) 융자 vs 보조금 구분 (가장 명확한 축)
  if (/융자|대출|빌리|빌려|상환|갚/.test(lower)) intent.fundType = '융자';
  else if (/보조금|지원금|받는|무상|출연/.test(lower)) intent.fundType = '보조금';

  return intent;
}

const IDX = {byTarget:{}, byRegion:{}, byCategory:{}, byPurpose:{}, byInstitution:{}, byFamily:{}};

function buildIndex() {
  // #4: 동일 공고명 변경 공고 → 최신본만 유지 (chatbot-db엔 registeredAt이 없으므로 제목순 마지막 유지)
  const titleMap = new Map();
  for (let i = 0; i < NOTICES.length; i++) {
    const n = NOTICES[i];
    const baseTitle = n.title?.replace(/\s*(변경|수정|정정|재)\s*공고\s*$/,'').replace(/\s*\d+차\s*/,'').trim() || '';
    if (baseTitle && titleMap.has(baseTitle)) {
      NOTICES[titleMap.get(baseTitle)]._hidden = true;
      titleMap.set(baseTitle, i);
    } else if (baseTitle) {
      titleMap.set(baseTitle, i);
    }
  }

  for (let i = 0; i < NOTICES.length; i++) {
    const n = NOTICES[i];
    if (n._hidden) continue;
    // 대상 축
    const t = n.target || '';
    const targetKey = t.includes('소상공인') ? '소상공인' : (t.includes('창업') || t.includes('벤처')) ? '창업벤처' : '중소기업';
    (IDX.byTarget[targetKey] ??= []).push(i);
    // 지역 축 (chatbot-db는 region 필드 사용)
    const region = n.region || '공통';
    (IDX.byRegion[region] ??= []).push(i);
    // 형태 축
    if (n.category) (IDX.byCategory[n.category] ??= []).push(i);
    // 목적 축 (신규 — 다축 핵심)
    for (const p of (n.purposes || [])) {
      (IDX.byPurpose[p] ??= []).push(i);
    }
    // 기관 축 (둘러보기)
    if (n.institution) (IDX.byInstitution[n.institution] ??= []).push(i);
    // 사업군 축 (지역별 비교)
    if (n.familyId && (n.familySize||1) > 1) (IDX.byFamily[n.familyId] ??= []).push(i);
  }
}

// 기관 위계: 1=중앙부처·산하기관, 2=지자체, 3=지자체 산하기관
const LOCAL_AGENCY_RE = /테크노파크|진흥원|진흥회|진흥공사|신용보증재단|보증재단|경제진흥|일자리경제|창조경제|문화재단|복지재단|디자인진흥|콘텐츠진흥|관광공사|개발공사|시설관리공단|출연|연구원|센터|TP$/;
function institutionTier(n) {
  // 전국 단위(지역 태그 없음) = 중앙부처 및 부처 산하기관(소상공인시장진흥공단 등)
  if (n.region === '공통' || !n.region) return 1;
  // 지역 단위: 수행기관이 지자체 산하기관이면 3, 아니면(지자체 직접) 2
  const ex = n.executor || '';
  if (LOCAL_AGENCY_RE.test(ex)) return 3;
  return 2;
}

// 빌리는 돈(융자·보증·카드) 여부 — 보조금과 구분
function isLoanType(n) {
  const t = (n.type || '') + ' ' + (n.subcategory || '');
  return /융자|대출|보증|카드|이차보전|특례보증|신용/.test(t);
}

function matchPolicies(slots) {
  let pool = null;
  function intersect(arr) {
    if (!pool) { pool = new Set(arr); return; }
    const s = new Set(arr);
    for (const v of pool) { if (!s.has(v)) pool.delete(v); }
  }
  if (slots.target && IDX.byTarget[slots.target]) intersect(IDX.byTarget[slots.target]);
  // #1,#2: 지역 = 해당 지역 + 공통(중앙정부). "공통" 선택 시 공통만.
  if (slots.region) {
    const regionIds = IDX.byRegion[slots.region] || [];
    const commonIds = slots.region !== '공통' ? (IDX.byRegion['공통'] || []) : [];
    intersect([...regionIds, ...commonIds]);
  }
  if (slots.category && IDX.byCategory[slots.category]) intersect(IDX.byCategory[slots.category]);
  // 목적 축 교차 (다축 핵심) — "인테리어 비용" 문제 정확 해결
  if (slots.purpose && slots.purpose !== '_any' && IDX.byPurpose[slots.purpose]) intersect(IDX.byPurpose[slots.purpose]);
  if (!pool) pool = new Set(Array.from({length:NOTICES.length},(_,i)=>i));

  // 점수 + 이유 태그
  const scored = [];
  for (const idx of pool) {
    const n = NOTICES[idx];
    if (n._hidden) continue;

    // 융자/보조금 하드 필터 — 보조금 선택 시 카드·보증 제외 (P0-3)
    if (slots.fundType && slots.fundType !== '_any') {
      const loan = isLoanType(n);
      if (slots.fundType === '융자' && !loan) continue;
      if (slots.fundType === '보조금' && loan) continue;
    }
    if (slots.industry && slots.industry !== '_any' && !matchesNoticeTerms(n, INDUSTRY_FILTERS[slots.industry])) continue;
    if (slots.qualification && slots.qualification !== '_any' && !matchesNoticeTerms(n, QUALIFICATION_FILTERS[slots.qualification])) continue;
    if (slots.businessAge && slots.businessAge !== '_any' && !matchesNoticeTerms(n, BUSINESS_AGE_FILTERS[slots.businessAge])) continue;

    let score = 0;
    const reasons = [];

    // 목적 적합성 — 실제 목적 태그로 검증
    if (slots.purpose && slots.purpose !== '_any') {
      if ((n.purposes || []).includes(slots.purpose)) { score += 10; reasons.push(`✅ ${slots.purpose}에 사용 가능`); }
      else { score -= 5; }
    }
    if (slots.fundType === '융자') reasons.push('💵 융자(빌린 뒤 갚는 자금)');
    else if (slots.fundType === '보조금') reasons.push('🎁 보조금(상환 부담 적음)');
    if (slots.industry && slots.industry !== '_any') { score += 4; reasons.push(`🏪 ${slots.industry} 관련`); }
    if (slots.qualification && slots.qualification !== '_any') { score += 4; reasons.push(`👤 ${slots.qualification} 조건`); }
    if (slots.businessAge && slots.businessAge !== '_any') { score += 4; reasons.push(`📆 ${slots.businessAge}`); }

    if (n.amount) { score += 3; reasons.push('💰 ' + n.amount); }
    const dl = deadlineBadge(n);
    if (dl?.cls === 'tag-deadline') { score += 5; reasons.push('⏰ ' + dl.text); }
    else if (dl?.cls === 'tag-open') { score += 2; reasons.push('📅 ' + dl.text); }
    if (n.online) { score += 2; reasons.push('📝 온라인 접수'); }
    // detailed 등급 가산 (정보 충실)
    if (n.grade === 'detailed') score += 1;

    scored.push({notice:n, score, reasons, money: n.amount, dl, tier: institutionTier(n)});
  }
  // 정렬: 기관 위계(중앙→지자체→지자체산하) 우선, 같은 위계 내 관련도 점수 순
  scored.sort((a,b) => a.tier - b.tier || b.score - a.score);
  return scored;
}

// P0-4: 결과를 신뢰도 기반 3그룹으로 분리
function groupResults(slots, results) {
  const strong = [], check = [];
  for (const r of results) {
    const n = r.notice;
    const closed = r.dl && r.dl.cls === 'tag-deadline' && r.dl.text === '마감';
    const lowInfo = n.grade === 'vague' || !n.amount;
    if (!closed && !lowInfo) strong.push(r); else if (!closed) check.push(r);
  }
  // 관련(인접) 사업: 가장 구체적 조건 하나를 완화
  const ids = new Set(results.map(r => r.notice.id));
  let related = [];
  if (slots.purpose && slots.purpose !== '_any') related = matchPolicies({...slots, purpose:null});
  else if (slots.fundType && slots.fundType !== '_any') related = matchPolicies({...slots, fundType:null});
  else if (slots.region && slots.region !== '공통') related = matchPolicies({...slots, region:'공통'});
  related = related.filter(r => !ids.has(r.notice.id));
  return { strong: strong.slice(0,3), check: check.slice(0,2), related: related.slice(0,2) };
}

// ═══════════════════════════════════════════
// Module 6: NARRATIVE BUILDER (요약 합성)
// ═══════════════════════════════════════════
function buildAdvisoryNarrative(slots, results) {
  const parts = [];
  // 상황 인식 확인 (다축)
  const purpose = (slots.purpose && slots.purpose !== '_any') ? slots.purpose : null;
  const fundType = (slots.fundType && slots.fundType !== '_any') ? slots.fundType : null;
  if (slots.target || slots.region || purpose || fundType || slots.category || slots.industry || slots.qualification || slots.businessAge) {
    const bits = [];
    if (slots.region) bits.push(slots.region + ' 지역');
    if (slots.target) bits.push(slots.target);
    if (purpose) bits.push(purpose + ' 용도');
    if (fundType) bits.push(fundType);
    if (slots.industry && slots.industry !== '_any') bits.push(slots.industry);
    if (slots.qualification && slots.qualification !== '_any') bits.push(slots.qualification);
    if (slots.businessAge && slots.businessAge !== '_any') bits.push(slots.businessAge);
    if (!purpose && slots.category) bits.push(slots.category);
    parts.push(bits.join(' · ') + ' 지원을 찾고 계시네요.');
  }

  if (results.length === 0) {
    parts.push('조건에 맞는 프로그램을 찾지 못했어요.');
    return parts.join(' ');
  }

  parts.push(`${results.length}건의 프로그램을 찾았어요.`);

  // 위계 안내: 여러 위계가 섞이면 순서 설명
  const tiers = new Set(results.map(r => r.tier).filter(Boolean));
  if (tiers.size > 1) {
    parts.push('중앙부처·산하기관 → 지자체 → 지자체 산하기관 순으로 보여드릴게요.');
  }

  // Top 3 차별점 분석
  const top3 = results.slice(0,3);
  const withMoney = top3.filter(r => r.money);
  const withDeadline = top3.filter(r => r.dl?.cls === 'tag-deadline');
  const withOnline = top3.filter(r => r.reasons.some(r=>r.includes('온라인')));

  if (top3.length >= 2) {
    // 목적 적합성 안내 (목적 태그 기반)
    if (slots.purpose && slots.purpose !== '_any') {
      const fitCount = top3.filter(r => (r.notice.purposes || []).includes(slots.purpose)).length;
      if (fitCount > 0) {
        parts.push(`이 중 ${fitCount}건이 "${slots.purpose}" 용도에 실제로 사용 가능한 프로그램이에요.`);
      } else {
        parts.push(`⚠️ "${slots.purpose}" 용도에 정확히 맞는 프로그램은 못 찾았어요. 아래 공고의 지원 내용을 직접 확인해 보세요.`);
      }
    }
    parts.push('추천 포인트:');
    if (withMoney.length > 0) {
      const best = withMoney.sort((a,b) => (b.money||'').length - (a.money||'').length)[0];
      parts.push(`• 지원금이 큰 건: ${best.notice.title.replace(/^\[[^\]]+\]\s*/,'').slice(0,25)}… (${best.money})`);
    }
    if (withDeadline.length > 0) {
      parts.push(`• 마감 임박: ${withDeadline[0].notice.title.replace(/^\[[^\]]+\]\s*/,'').slice(0,25)}… (${withDeadline[0].dl.text})`);
    }
    if (withOnline.length > 0 && parts.length < 6) {
      parts.push(`• 온라인 접수 가능: ${withOnline[0].notice.title.replace(/^\[[^\]]+\]\s*/,'').slice(0,25)}…`);
    }
  }

  return parts.join('\n');
}

// ═══════════════════════════════════════════
// Module 7: COMPARE TABLE RENDERER
// ═══════════════════════════════════════════
function renderCompareTable(items) {
  if (items.length < 2) return '';
  const top3 = items.slice(0,3);
  const cols = top3.map((r,i) => {
    const n = r.notice;
    const money = n.amount || '-';
    const period = trunc(n.period || '-', 20);
    const target = trunc(n.target || '-', 12);
    const method = trunc(n.method || '-', 15);
    const dlCls = r.dl?.cls === 'tag-deadline' ? ' warn' : '';
    const best = i === 0 ? ' compare-best' : '';
    return `<div class="compare-col${best}">
      <div class="compare-header">${esc(trunc(n.title,30))}</div>
      <div class="compare-row"><span class="ci">💰</span><span class="cv hl">${esc(money)}</span></div>
      <div class="compare-row"><span class="ci">📅</span><span class="cv${dlCls}">${esc(period)}</span></div>
      <div class="compare-row"><span class="ci">👤</span><span class="cv">${esc(target)}</span></div>
      <div class="compare-row"><span class="ci">📝</span><span class="cv">${esc(method)}</span></div>
    </div>`;
  });
  return `<div class="compare-table">${cols.join('')}</div>`;
}

function renderSlotBadges(slots) {
  const show = ['target','region','category','purpose','fundType','industry','qualification','businessAge'];
  let html = '';
  for (const key of show) {
    const val = slots[key];
    if (!val || val === '_any') continue;
    html += `<span class="slot-badge">${esc(val)} <button class="slot-remove" data-slot="${key}">×</button></span>`;
  }
  return html ? `<div class="slot-badges">${html}</div>` : '';
}

function normalizeGlossaryText(text) {
  return text.toLowerCase().replace(/[^a-z0-9가-힣]/g, '');
}

function findGlossaryTerm(query) {
  const normalized = normalizeGlossaryText(query);
  for (const [term, item] of Object.entries(TERM_GLOSSARY)) {
    const names = [term, ...(item.aliases || [])];
    if (names.some(name => normalized.includes(normalizeGlossaryText(name)))) return term;
  }
  return null;
}

function isGlossaryQuestion(query, term) {
  const normalized = normalizeGlossaryText(query);
  const names = [term, ...(TERM_GLOSSARY[term]?.aliases || [])].map(normalizeGlossaryText);
  return names.includes(normalized) || /뭐|뭔|무슨뜻|뜻|설명|알려|의미|무엇|어떤|말하|궁금|차이/.test(query);
}

  if (!slots.category) {
    return {

      chips: [
        {label:'💰 자금·금융 지원', slot:'category', value:'금융'},

        {label:'🛒 판로·마케팅', slot:'category', value:'내수'},
      ]
    };
  }
  // 금융이면 융자/보조금 먼저 구분 (가장 명확한 축)
  if (slots.category === '금융' && !slots.fundType) {
    return {

      chips: [

    };
  }
  // 목적(用途) 질문 — 다축의 핵심 (일상어 병기)
  if (!slots.purpose) {
    const purposeChips = (CATEGORY_PURPOSES[slots.category] || []).map(p => {
      const plain = PURPOSE_PLAIN[p];
      return {label: plain ? `${p} · ${plain}` : p, slot:'purpose', value:p};
    });
    purposeChips.push({label:'잘 모르겠어요', slot:'purpose', value:'_any'});
    return {
      question: '어떤 곳에 쓰실 자금인가요?',
      chips: purposeChips,
    };
  }
  if (!slots.region) {
    return {
      question: '어느 지역에서 사업하세요? (공통=전국 누구나)',
      chips: [

        {label:'대전', slot:'region', value:'대전'},
        {label:'대구', slot:'region', value:'대구'},
        {label:'인천', slot:'region', value:'인천'},
        {label:'광주', slot:'region', value:'광주'},
      ]
    };
  }
  return null; // 충분한 슬롯 (업종·추가조건은 결과 후 follow-up으로)
}

const TYPO_MAP = {
  '소상공이':'소상공인','소상공인자금':'소상공인 자금','창엽':'창업',

  '판매지원':'판매 지원','보증서류':'보증 서류','경영안정':'경영 안정',
  '사업화지원':'사업화 지원','온라인판로':'온라인 판로',
};

function correctTypos(text) {
  let result = text;
  for (const [typo, fix] of Object.entries(TYPO_MAP)) {
    if (result.includes(typo)) result = result.replace(typo, fix);
  }
  return result;
}

function expandQuery(tokens) {
  const expanded = new Set(tokens);
  for (const tok of tokens) {
    const syns = SYNONYMS[tok];
    if (syns) syns.forEach(s => expanded.add(s));
    for (const [key, vals] of Object.entries(SYNONYMS)) {
      if (key.includes(tok) || tok.includes(key)) vals.forEach(s => expanded.add(s));
    }
  }
  return [...expanded];
}

async function askAboutNotice(noticeId, topicLabel) {
  const notice = NOTICES.find(n => n.id === noticeId);
  const title = notice ? trunc(notice.title, 24) : '이 공고';
  addUserBubble(`${title} · ${topicLabel} 알려줘`);
  track('notice_ask', {id: noticeId, topic: topicLabel});
  _busy = true; setInputEnabled(false); showThinking();
  const data = await loadSections();
  hideThinking(); _busy = false; setInputEnabled(true);

  const rec = data[noticeId];
  const sections = rec?.sections || {};
  // 토픽 직접 매칭 → 별칭 매칭 → fullText 스니펫
  let key = Object.keys(sections).find(k => k === topicLabel)
    || Object.keys(sections).find(k => (TOPIC_ALIASES[topicLabel]||[]).some(a => k.includes(a)));
  let body, found = false;
  if (key && sections[key]) { body = sections[key]; found = true; }
  else {
    const aliases = TOPIC_ALIASES[topicLabel] || [topicLabel];
    const ft = rec?.fullText || '';
    const idx = aliases.map(a => ft.indexOf(a)).find(i => i >= 0);
    if (idx != null && idx >= 0) { body = '…' + ft.slice(Math.max(0,idx-20), idx+260) + '…'; found = true; }
  }

  const url = notice?.url;
  if (found) {

    addBotPanel(html, url ? [{label:'📄 공식 공고 보기', q:'__open:'+noticeId}] : []);

      url ? [{label:'📄 공식 공고에서 직접 확인', q:'__open:'+noticeId}] : []);

}

// ── Search ──
// #1,#2: 한글 1글자 허용 (영문은 2글자 이상)
function tokenize(t) {
  return t.toLowerCase().replace(/[^\w가-힣ㄱ-ㅎㅏ-ㅣ\s]/g,' ')
    .split(/\s+/)
    .filter(w => /[가-힣]/.test(w) ? w.length >= 1 : w.length >= 2);
}

function parseDeadline(text) {
  if (!text) return null;
  const m = text.match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
  if (!m) return null;
  const d = new Date(+m[1], +m[2]-1, +m[3]);
  return isNaN(d.getTime()) ? null : d;
}

function search(query) {
  const isDeadline = query === '__deadline__';
  const today = new Date();
  today.setHours(0,0,0,0);

  if (isDeadline) {
    const withDates = NOTICES.filter(n => !n._hidden).map(n => {
      const period = n.period || '';
      const dl = parseDeadline(period.split('~').pop());
      return {notice: n, deadline: dl};
    }).filter(x => x.deadline && x.deadline >= today);
    withDates.sort((a,b) => a.deadline - b.deadline);
    return {items: withDates.slice(0, 8).map(x => ({notice: x.notice, score: 100, reasons: [], dl: deadlineBadge(x.notice)})), total: withDates.length, expanded: false};
  }

  // #28-30: 오타 교정 적용
  const corrected = correctTypos(query);
  const tokens = tokenize(corrected);
  if (!tokens.length) return {items: [], total: 0, expanded: false};

  function scoreWith(toks) {
    const scored = [];
    const seen = new Set(); // #19: dedup
    for (const n of NOTICES) {
      if (n._hidden || seen.has(n.id)) continue;
      let score = 0;
      const title = (n.title||'').toLowerCase();
      const cat = (n.category||'').toLowerCase();
      const sub = (n.subcategory||'').toLowerCase();
      const purposes = (n.purposes||[]).join(' ').toLowerCase();
      const body = ((n.summary||'') + ' ' + (n.target||'') + ' ' + (n.method||'')).toLowerCase();
      for (const tok of toks) {
        if (title.includes(tok)) score += 5;
        if (purposes.includes(tok)) score += 3;
        if (cat.includes(tok) || sub.includes(tok)) score += 2;
        if (body.includes(tok)) score += 1;
      }
      if (score > 0) { scored.push({notice:n, score, reasons: [], dl: deadlineBadge(n)}); seen.add(n.id); }
    }
    scored.sort((a,b) => b.score - a.score);
    return scored;
  }

  // 1차: 원본
  let results = scoreWith(tokens);
  if (results.length > 0) return {items: results.slice(0, 5), total: results.length, expanded: false, corrected: corrected !== query ? corrected : null};

  // 2차: 유사어 확장
  const expanded = expandQuery(tokens);
  if (expanded.length > tokens.length) {
    results = scoreWith(expanded);
    if (results.length > 0) {
      return {items: results.slice(0, 5), total: results.length, expanded: true,
        expandedTerms: expanded.filter(t => !tokens.includes(t)).slice(0, 4),
        corrected: corrected !== query ? corrected : null};
    }
  }
  return {items: [], total: 0, expanded: false, corrected: corrected !== query ? corrected : null};
}

// ── Extract helpers ──
// #4,#32: 금액 추출 개선 + 중복 제거
function extractMoney(text) {
  if (!text) return null;
  const matches = [...text.matchAll(/(\d[\d,]*)\s*(억원|억|천만원|백만원|만원|만)/g)];
  if (!matches.length) return null;
  const unique = [...new Set(matches.map(m => m[0]))];
  if (unique.length === 1) return unique[0];
  return unique.slice(0, 2).join(' ~ ');
}

// #5: cleanSummary 강화
function cleanSummary(text) {
  if (!text) return '';
  let s = text.replace(/<[^>]+>/g,' ').replace(/&\w+;/g,' ').replace(/\s+/g,' ').trim();
  const parts = s.split(/\s*[☞○◎▶]\s*/).filter(p => p.length > 5);
  const isLegal = p => /[「『\[][^」』\]]+[」』\]]|제\d+조|조례|규정에\s*의[하거]/.test(p);
  const isBureaucratic = p => /(공고합니다|안내합니다|알려드립니다|다음과\s*같이|시행합니다)/.test(p);
  let pick = parts.find(p => !isLegal(p) && !isBureaucratic(p));
  if (!pick) pick = parts.find(p => !isBureaucratic(p));
  if (!pick) pick = parts[0] || s;
  pick = pick.replace(/[「『][^」』]*[」』]\s*(제\d+조[의의]\d*[^,.)\s]*)?/g, '').replace(/제\d+조[^,.)]*[,.)]?\s*/g, '').replace(/[「『][^」』]*[」』]/g, '');
  pick = pick.replace(/^[\s\-·]+/,'').trim();
  if (pick.length < 10) pick = s.replace(/<[^>]+>/g,' ').replace(/&\w+;/g,' ').replace(/\s+/g,' ').trim();
  // 최종 정리: 잔여 법률 마커 강제 제거
  pick = pick.replace(/[「『][^」』]*[」』]\s*/g, '').replace(/제\d+조[^\s,.)]{0,10}\s*/g, '').replace(/\s{2,}/g,' ').trim();
  const sentences = pick.split(/(?<=[.다요])\s/);
  const first = sentences[0] || pick;
  return first.length > 100 ? first.slice(0,100)+'…' : first;
}

// ── 톤 정규화 (#23,#24 수정) ──
function normalizeTone(text) {
  if (!text) return '';
  let s = text.replace(/<[^>]+>/g,' ').replace(/&\w+;/g,' ');
  s = s.replace(/[「『][^」』]+[」』]\s*(제\d+조[^)]*\))?\s*(에\s*(의한|따른|따라|의거한?|근거한?))/g, '관련 법률에 따른');
  s = s.replace(/[「『][^」』]+[」』]/g, '');
  // #23: "~하오니 많은 신청 바랍니다" 전체를 한번에 제거
  s = s.replace(/[,.]?\s*하오니[^.]*바랍니다\.?\s*/g, '. ');
  s = s.replace(/다음과\s*같이\s*(공고|안내|알려|시행)\S*/g, '');
  s = s.replace(/(이에|이를)\s*(다음과\s*같이|아래와\s*같이)\s*/g, '');
  s = s.replace(/많은\s*(관심과\s*)?(참여|신청|응모)\s*바랍니다\.?/g, '');
  s = s.replace(/[☞◎▶■▷△□●○]\s*/g, '· ');
  // #24: 연속 마커 정리
  s = s.replace(/(·\s*){2,}/g, '· ');
  s = s.replace(/※\s*자세한\s*[^\n※]{0,30}(공고문|붙임|첨부)\s*(참[조고]|확인)\.?/g, '');
  s = s.replace(/※\s*세부.*?(공고문|붙임)\s*참[조고]\.?/g, '');
  s = s.replace(/\(?\s*자세한\s*[^\n)]{0,20}(공고문|붙임)\s*참[조고]\s*\)?\.?/g, '');
  s = s.replace(/바랍니다\.?\s*/g, '. ');
  s = s.replace(/안내드립니다\.?\s*/g, '. ');
  s = s.replace(/알려\s*드립니다\.?\s*/g, '. ');
  s = s.replace(/\.\s*\./g, '.');
  s = s.replace(/\s{2,}/g, ' ');
  s = s.replace(/^\s*[·\-]\s*/, '');
  return s.trim();
}

function cleanNoticePhrase(text) {
  return normalizeTone(text || '')
    .replace(/※\s*자세한\s*(지원대상|지원내용|신청방법)?\s*(공고문|붙임|첨부)\s*(참[조고]|확인).*/g, '')
    .replace(/\s*※.*$/g, '')
    .replace(/[.…]+\s*$/g, '')
    .replace(/[,;:]\s*$/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function splitNoticeSummary(notice) {
  const parts = String(notice.summary || '').split(/\s*\/\s*/);
  const audience = cleanNoticePhrase(parts.shift() || notice.target || '');
  const support = cleanNoticePhrase(parts.join(' / '));
  return {audience, support};
}

function firstSupportPhrase(text) {
  return cleanNoticePhrase(text).split(/\s+-\s+|※/)[0].replace(/[.…]+\s*$/g, '').trim();
}

function displayProgramName(notice) {
  let name = String(notice.title || '')
    .replace(/^\[[^\]]+\]\s*/, '')
    .replace(/\b20\d{2}년\s*/g, '')
    .replace(/\s+(수정|변경|연장|재|추가)\s*공고$/, '')
    .replace(/\s+공고$/, '')
    .replace(/\s+(참가|참여|수요|지원|보육)?기업\s*(추가\s*)?모집$/, '')
    .replace(/\s+(대상자|참가자)\s*(추가\s*)?모집$/, '')
    .replace(/\s+(추가\s*)?모집$/, '')
    .replace(/\s+신청서\s*접수$/, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
  return name || notice.type || notice.category || '지원사업';
}

function displaySupport(notice) {
  const {support} = splitNoticeSummary(notice);
  const core = firstSupportPhrase(support);
  if (core) return core;
  const name = displayProgramName(notice);
  if (/지원사업$/.test(name)) return name.replace(/지원사업$/, '지원');
  if (/지원계획$/.test(name)) return name.replace(/지원계획$/, '지원');
  const fallback = {
    '금융':'사업 운영에 필요한 자금 조달',
    '창업':'창업 준비와 사업 성장',
    '내수':'판로 확대와 홍보',
    '경영':'기업 운영과 성장',
  };
  const type = notice.type || notice.category || '맞춤형';
  return `${fallback[notice.category] || '사업 추진'}을 위한 ${type}${/지원$/.test(type) ? '' : ' 지원'}`;
}

function displayEligibility(notice, compact = false) {
  const {audience} = splitNoticeSummary(notice);
  if (!audience) return notice.target || '공고문에서 확인 필요';
  if (!compact) return audience;
  const patterns = [
    /\d+\s*년\s*(?:이내|미만)\s*창업자(?:\s*또는\s*예비창업자)?/,
    /창업\s*\d+\s*년\s*(?:이내|미만|초과)\s*(?:기업|창업기업|창업자)?/,
    /예비창업자(?:\(팀\))?(?:\s*또는\s*창업기업)?/,
  ];
  return patterns.map(pattern => audience.match(pattern)?.[0]).find(Boolean) || (audience.length <= 48 ? audience : notice.target || audience);
}

function displayAmount(notice) {
  const prize = String(notice.summary || '').match(/총\s*상금\s*[\d,.]+\s*(?:억|천만|백만|만)?원/);
  return prize?.[0] || notice.amount || '';
}

function displayBenefit(notice) {
  const support = displaySupport(notice);
  const amount = displayAmount(notice);
  return amount && !support.includes(amount) ? `${support} (지원 규모: ${amount})` : support;
}

function displayPurpose(notice) {
  const name = displayProgramName(notice);
  const source = `${name} ${notice.type || ''} ${notice.category || ''} ${displaySupport(notice)}`;
  if (/농식품\s*창업콘테스트/.test(name)) {
    return '농식품 분야의 기술과 아이디어를 가진 창업자를 발굴하고, 우수팀의 성장 기회를 넓히기 위해 마련된 콘테스트예요.';
  }
  if (/콘테스트|경진대회|공모전|경연/.test(source)) {
    return '유망한 아이디어와 역량을 갖춘 참여자를 발굴하고, 우수팀의 성장 기회를 넓히기 위해 마련된 프로그램이에요.';
  }
  if (/육성자금|융자|대출|이차보전|이자보전|보증/.test(source)) {
    return '사업 운영에 필요한 자금 조달 부담을 덜고, 안정적인 경영을 돕기 위한 금융 지원사업이에요.';
  }
  if (/임차료|임대료/.test(source)) {
    return '사업이나 영농 활동에 필요한 임차 비용 부담을 덜어주기 위한 지원사업이에요.';
  }
  if (/스마트공장|시설|설비|구축|입지|공간/.test(source)) {
    return '필요한 시설과 시스템을 마련해 사업 운영 기반과 경쟁력을 높일 수 있도록 돕는 사업이에요.';
  }
  if (/박람회|전시회|판로|마케팅|홍보|온라인몰|입점|수출/.test(name)) {
    return '제품과 서비스를 알리고 새로운 판로를 넓힐 수 있도록 돕기 위한 사업이에요.';
  }
  if (/교육|역량강화|아카데미|워크숍/.test(name)) {
    return '사업 운영에 필요한 실무 역량을 높일 수 있도록 돕기 위한 프로그램이에요.';
  }
  if (/상담|컨설팅|멘토링|자문/.test(source)) {
    return '전문가의 상담과 조언을 통해 기업의 문제 해결과 성장을 돕기 위한 사업이에요.';
  }
  if (/박람회|전시회|판로|마케팅|홍보|온라인몰|입점|수출/.test(source)) {
    return '제품과 서비스를 알리고 새로운 판로를 넓힐 수 있도록 돕기 위한 사업이에요.';
  }
  if (/교육|역량강화|아카데미|워크숍/.test(source)) {
    return '사업 운영에 필요한 실무 역량을 높일 수 있도록 돕기 위한 프로그램이에요.';
  }
  if (/창업|사업화|시제품|제품개발/.test(source)) {
    return '아이디어와 기술을 실제 사업으로 발전시키고, 성장 기반을 마련할 수 있도록 돕는 사업이에요.';
  }
  const fallback = {
    '금융':'사업 운영에 필요한 자금 부담을 덜어주기 위한 금융 지원사업이에요.',
    '창업':'창업자의 사업 준비와 성장을 돕기 위한 지원사업이에요.',
    '내수':'제품과 서비스를 알리고 판로를 넓힐 수 있도록 돕기 위한 사업이에요.',
    '경영':'기업의 운영 부담을 줄이고 경쟁력을 높일 수 있도록 돕기 위한 사업이에요.',
  };
  return fallback[notice.category] || '사업 추진에 필요한 지원을 제공해 기업의 성장을 돕기 위한 사업이에요.';
}

function directionParticle(text) {
  const last = String(text || '').trim().slice(-1);
  const code = last.charCodeAt(0);
  if (code < 0xAC00 || code > 0xD7A3) return '로';
  const jong = (code - 0xAC00) % 28;
  return jong && jong !== 8 ? '으로' : '로';
}

function noticeIdentity(notice) {
  // 제목은 카드에 이미 있으니, 사업 성격만 사람말로
  return displayPurpose(notice);
}

function noticeExplanation(notice) {
  const elig = displayEligibility(notice, true);
  const support = displaySupport(notice);
  let s = displayPurpose(notice);
  if (elig) s += ` ${elig} 대상이에요.`;
  if (support) s += ` ${support}`;
  return s;
}

function noticeBriefingIntro(notice) {
  const eligibility = displayEligibility(notice, true);
  let s = displayPurpose(notice);
  if (eligibility) s += ` ${eligibility} 대상이고요. 아래에서 지원 내용과 신청 방법을 차례로 정리해 드릴게요.`;
  else s += ' 아래에서 지원 내용과 신청 방법을 차례로 정리해 드릴게요.';
  return s;
}

function getTopCategory(results) {
  const counts = {};
  results.forEach(r => { const c=r.notice.category||'기타'; counts[c]=(counts[c]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';
}

function buildNarrative(query, searchResult) {
  const {items, total, expanded, expandedTerms, corrected} = searchResult;
  if (query === '__deadline__') {
    return `마감이 가까운 공고를 찾아봤어요. 신청 마감일이 빠른 순으로 ${items.length}건을 보여드릴게요.`;
  }
  const cat = getTopCategory(items);
  const info = CATEGORY_NARRATIVES[cat] || {emoji:'📌', verb:'지원'};
  lastCategory = cat;
  const keywords = tokenize(query).slice(0,3).join(', ');
  let prefix = corrected ? `"${corrected}"(으)로 검색했어요. ` : '';

  if (expanded && items.length > 0) {
    const terms = expandedTerms?.join(', ') || '';
    return `${prefix}"${keywords}"을 직접 찾지는 못했지만, 관련 키워드(${terms})로 ${items.length}건을 찾았어요. 혹시 이런 사업을 찾으셨나요?`;
  }
  if (total >= 100) {
    return `${prefix}"${keywords}" 관련 ${info.verb} 프로그램을 찾아봤어요. 총 ${total}건 중 가장 관련 높은 ${items.length}건을 추천해 드릴게요.`;
  } else if (total > 0) {
    return `${prefix}"${keywords}" 관련 프로그램 ${total}건을 찾았어요. 그중 추천 ${items.length}건이에요.`;
  }
  return `${prefix}"${keywords}"에 정확히 맞는 프로그램을 찾지 못했어요. 아래 키워드로 다시 찾아볼까요?`;
}

// #21,#22: follow-up 맥락 반영 개선
function buildFollowups(query, searchResult) {
  const {items, expanded} = searchResult;
  const chips = [];
  const cat = getTopCategory(items);

  if (items.length === 0) {
    chips.push({label:'💰 자금 지원', q:'소상공인 자금 지원 융자 대출'});
    chips.push({label:'🚀 창업 지원', q:'창업 초기 예비창업 스타트업 사업화'});
    chips.push({label:'📋 컨설팅', q:'경영 컨설팅 진단 멘토링 자문'});
    chips.push({label:'🛒 판로 지원', q:'온라인 판로 판매 마케팅 홍보 수출'});
    return chips;
  }

  // #22: 확장 검색이면 "아니에요" 칩
  if (expanded) {
    chips.push({label:'원하는 결과가 아니에요', q:'__show_categories__'});
  }

  if (query !== '__deadline__') chips.push({label:'⏰ 마감 임박한 것만', q:'__deadline__'});

  // 맥락별 추천
  const keywords = tokenize(query);
  if (cat === '금융' && !keywords.includes('창업')) chips.push({label:'🚀 창업 지원도 볼래요', q:'창업 초기 예비창업 지원'});
  else if (cat === '창업' && !keywords.includes('자금')) chips.push({label:'💰 자금 지원도 볼래요', q:'소상공인 자금 융자 대출'});
  else if (cat === '경영') chips.push({label:'💰 자금 지원 보기', q:'소상공인 자금 지원 융자'});
  else if (cat === '내수') chips.push({label:'🌏 수출 지원 보기', q:'수출 해외 글로벌 무역 바이어'});
  else chips.push({label:'💰 자금 지원 보기', q:'소상공인 자금 지원 융자'});

  if (cat) chips.push({label:`${cat} 분야 더 보기`, q:`${cat} 지원 프로그램`});
  return chips.slice(0, 4);
}

// #20: 비정형 기간 배지
function deadlineBadge(notice) {
  const period = notice.period || '';
  if (/예산\s*소진/i.test(period)) return {text:'예산소진시', cls:'tag-budget'};
  if (/상시\s*(접수|모집)?/i.test(period)) return {text:'상시접수', cls:'tag-open'};
  if (/선착순/i.test(period)) return {text:'선착순', cls:'tag-deadline'};
  if (/수시/i.test(period)) return {text:'수시접수', cls:'tag-open'};
  const parts = period.split('~');
  const end = parseDeadline(parts.length > 1 ? parts[1] : parts[0]);
  if (!end) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((end - today) / 86400000);
  if (diff < 0) return {text:'마감', cls:'tag-deadline'};
  if (diff <= 30) return {text:`D-${diff}`, cls:'tag-deadline'};
  return {text: `~${end.getMonth()+1}.${end.getDate()}`, cls:'tag-period'};
}

// 금액 문자열 → 숫자 (정렬용)
function amountValue(s) {
  if (!s) return 0;
  const m = String(s).match(/(\d[\d,]*)\s*(억원|천만원|백만원|만원|만)/);
  if (!m) return 0;
  const unit = {'억원':1e8,'천만원':1e7,'백만원':1e6,'만원':1e4,'만':1e4}[m[2]] || 1;
  return parseInt(m[1].replace(/,/g,'')) * unit;
}

// P0-6: 서류 추출 불완전 문구 정제 ("6 -", "❍ 제출서류", 단일 글자 등 제거)
function cleanEntries(entries) {
  if (!Array.isArray(entries)) return [];
  return entries.map(d => (d||'')
      .replace(/^[\s\d]+\s*[-.)]\s*/,'')      // "6 -", "1." 제거
      .replace(/^[❍○◦▪□■※*·\-]+\s*/,'')      // 글머리 기호 제거
      .replace(/^제출\s*서류\s*[:：]?\s*/,'')   // "제출서류:" 머리말 제거
      .replace(/\s+/g,' ').trim())
    .filter(d => d.length >= 3 && /[가-힣A-Za-z]/.test(d));  // 의미있는 항목만
}

function cleanDocs(docs) {
  return cleanEntries(docs).filter(d =>
    d.length <= 180 &&
    /(신청서|동의서|사업자등록|등기부|증명서|확인서|계획서|견적서|서약서|자료|서류|신분증|통장|인감|재무|납세|국세|지방세|이력서|포트폴리오|IR|인증서|사본|양식|첨부)/i.test(d)
  );
}

function cleanExclusions(exclusions) {
  return cleanEntries(exclusions).filter(d => d.length >= 8 && !/중\s*어느$/.test(d));
}

// 준비 체크리스트 텍스트 생성 (복사용)
function buildChecklist(n) {
  const lines = [`[${n.title}]`];
  if (displayAmount(n)) lines.push(`· 지원금: ${displayAmount(n)}`);
  if (n.period) lines.push(`· 신청기한: ${n.period}`);
  lines.push(`· 지원대상: ${displayEligibility(n)}`);
  const docs = cleanDocs(n.documents);
  if (docs.length) { lines.push('· 준비 서류:'); docs.forEach(d => lines.push(`   - ${d}`)); }
  else lines.push('· 준비 서류: 공고문에서 확인 필요');
  const c = n.contact || {};
  const contact = [c.name, c.phone].filter(Boolean).join(' ');
  if (contact) lines.push(`· 문의: ${contact}`);
  if (n.url) lines.push(`· 공식 공고: ${n.url}`);
  lines.push('※ 신청 가능 여부는 공식 공고에서 최종 확인하세요.');
  return lines.join('\n');
}

function renderCard(item, activePurpose) {
  const idx = ++_cardSeq; // #26: 안전한 ID
  const n = item.notice;
  const summary = noticeExplanation(n);

  const dl = deadlineBadge(n);

  let glance = '';
  if (money) glance += `<div class="glance-item"><span class="glance-icon">💰</span><span class="glance-label">지원금</span><span class="glance-val highlight">${esc(money)}</span></div>`;
  if (period) glance += `<div class="glance-item"><span class="glance-icon">📅</span><span class="glance-label">기한</span><span class="glance-val${dl?.cls==='tag-deadline'?' warn':''}">${esc(period)}</span></div>`;

  // 준비 난이도 (서류 수)
  const cleanedDocs = cleanDocs(n.documents);
  const docLabel = cleanedDocs.length ? `서류 ${cleanedDocs.length}종` : '서류 정보 미상';
  glance += `<div class="glance-item"><span class="glance-icon">📄</span><span class="glance-label">준비</span><span class="glance-val">${esc(docLabel)}</span></div>`;

  // 태그: 분야 + 마감 + 목적 태그(다축 시각화) — 균일 높이 위해 목적은 최대 3개
  let tags = '';
  if (n.category) tags += `<span class="tag tag-cat">${esc(n.category)}</span>`;
  if (dl) tags += `<span class="tag ${dl.cls}">${dl.text}</span>`;
  // 요청 목적을 맨 앞으로 정렬 후 상위 3개만
  const allPurposes = (n.purposes || []);
  const ordered = activePurpose
    ? [...allPurposes.filter(p => p === activePurpose), ...allPurposes.filter(p => p !== activePurpose)]
    : allPurposes;
  for (const p of ordered.slice(0, 3)) {
    const active = activePurpose && p === activePurpose;
    tags += `<span class="tag ${active ? 'tag-purpose-active' : 'tag-purpose'}">${esc(p)}</span>`;
  }
  if (ordered.length > 3) tags += `<span class="tag tag-purpose">+${ordered.length - 3}</span>`;
  // 정보 부족 정직 표시
  if (n.grade === 'vague') tags += `<span class="tag tag-warn-grade">⚠️ 확인 필요</span>`;

  // 상세: 구조화된 필드 직접 사용 (서류는 정제본 사용)
  const docText = cleanedDocs.length ? cleanedDocs.map(d=>'· '+d).join('\n') : '공고문에서 세부 서류를 확인해 주세요.';
  const exclText = cleanExclusions(n.exclusions).length ? cleanExclusions(n.exclusions).map(d=>'· '+d).join('\n') : '';
  const QA = [
    ['어떤 사업인가요?', noticeIdentity(n)],

    ['어떤 지원을 받을 수 있나요?', displayBenefit(n)],
    ['언제까지 신청하나요?', n.period],
    ['어떻게 신청하나요?', n.method],
    ['필요한 서류는?', docText],
    ['제외 조건이 있나요?', exclText],

  let detailHtml = '';
  for (const [question, value] of QA) {
    if (!value) continue;
    detailHtml += `<div class="detail-section"><div class="detail-q">${question}</div><div class="detail-a">${esc(trunc(value, 400))}</div></div>`;
  }
  // 문의처
  const c = n.contact || {};
  const contactStr = [c.name, c.phone, c.email].filter(Boolean).join(' · ');
  if (contactStr) detailHtml += `<div class="detail-section"><div class="detail-q">누구에게 물어보나요?</div><div class="detail-a">${esc(contactStr)}</div></div>`;

  window._checklists[n.id] = buildChecklist(n);

  if (c.phone) actions += `<a class="card-act" href="tel:${esc(c.phone)}" onclick="track('contact_click',{id:'${esc(n.id)}'})">📞 문의 ${esc(c.phone)}</a>`;
  actions += `<button class="card-act" onclick="copyChecklist('${esc(n.id)}', this)">📋 준비 체크리스트 복사</button>`;
  detailHtml += `<div class="card-actions">${actions}</div>`;

  // 공고 자유 추출: "이 공고에 더 물어보기" 토픽 칩
  detailHtml += `<div class="ask-topics" data-nid="${esc(n.id)}">

    <button class="ask-topic" data-ask="우대·가점">우대·가점</button>
    <button class="ask-topic" data-ask="지원 제외">제외 조건</button>
    <button class="ask-topic" data-ask="제출 서류">필요 서류</button>
    <button class="ask-topic" data-ask="사후관리·정산">사후관리</button>
  </div>`;

  // 사업군 비교 칩 (같은 사업이 여러 지역에)
  let famChip = '';
  if ((n.familySize||1) > 1) {
    famChip = `<button class="chip" data-q="__family:${esc(n.familyId)}" style="margin-top:6px">🔀 다른 지역 ${n.familySize-1}곳과 비교</button>`;
  }

  return `<div class="card">
    <div class="card-title" onclick="toggleDetail(${idx})">${esc(n.title)}</div>
    <div class="card-summary">${esc(summary)}</div>
    <div class="card-glance">${glance}</div>

    <div class="card-detail" id="det${idx}"><div class="card-detail-inner">${detailHtml}</div></div>
    ${famChip}
  </div>`;
}

function toResultItem(notice, score = 0) {
  return {notice, score, reasons:[], dl:deadlineBadge(notice), tier:institutionTier(notice)};

function parseNoticeDates(period) {
  const matches = [...String(period || '').matchAll(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/g)]
    .map(m => new Date(+m[1], +m[2]-1, +m[3]))
    .filter(d => !isNaN(d.getTime()));
  return {start:matches[0] || null, end:matches[1] || matches[0] || null};
}

function inMonth(date, start, end) {
  return !!date && date >= start && date <= end;
}

function briefingMonthRange() {
  const today = new Date(); today.setHours(0,0,0,0);
  return {today, start:new Date(today.getFullYear(), today.getMonth(), 1), end:new Date(today.getFullYear(), today.getMonth()+1, 0)};
}

function renderBriefingMenu() {

    {label:'⏰ 이번 달 마감 예정',q:'__briefing:month:deadline'},
    {label:'💰 이번 달 금융 공고',q:'__briefing:month:cat:금융'},
    {label:'🚀 이번 달 창업 공고',q:'__briefing:month:cat:창업'},
  ]);
}

function getMonthlyBriefingItems(category) {
  const {today,start,end} = briefingMonthRange();
  const live = NOTICES.filter(n => !n._hidden && (!category || n.category === category));
  const rows = live.map(n => ({notice:n, ...parseNoticeDates(n.period), openEnded:/상시|예산\s*소진|수시/.test(n.period || '')}));
  const newRows = rows.filter(r => inMonth(r.start,start,end));
  const closingRows = rows.filter(r => inMonth(r.end,start,end) && r.end >= today).sort((a,b)=>a.end-b.end);
  const openRows = rows.filter(r => r.openEnded);
  const activeRows = rows.filter(r => r.openEnded || (r.end && r.end >= today && (!r.start || r.start <= end)));
  const featured = [];
  const seen = new Set();
  for (const r of [...closingRows,...newRows,...openRows,...activeRows]) {
    if (!seen.has(r.notice.id)) { seen.add(r.notice.id); featured.push(r.notice); }
  }
  return {today,start,end,newRows,closingRows,openRows,activeRows,featured};
}

function renderMonthlyBriefing(view = 'overview', category = null) {
  const data = getMonthlyBriefingItems(category);
  const monthLabel = `${data.today.getFullYear()}년 ${data.today.getMonth()+1}월`;

function noticeOrdinal(query) {
  if (/첫\s*번째|첫째|1\s*번/.test(query)) return 0;
  const m = query.match(/([2-5])\s*번|([2-5])\s*번째/);
  return m ? +(m[1] || m[2]) - 1 : null;
}

function findNoticeBriefingCandidates(query) {
  const cleaned = query.replace(/이번\s*달|이번달|공고|브리핑|요약|정리|설명|해줘|해주세요|알려줘|자세히|상세히/g,' ').replace(/\s+/g,' ').trim();
  if (!cleaned) return [];
  return search(cleaned).items;
}

function countActive(indices) { return indices.filter(i => !NOTICES[i]._hidden).length; }

// 분포 라벨 헬퍼
function distLabel(items, keyFn) {
  const c = {};
  for (const it of items) { const k = keyFn(it.notice); if(k) c[k]=(c[k]||0)+1; }
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([k,v])=>`${k} ${v}`).join(' · ') || '-';
}
