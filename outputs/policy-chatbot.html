// ── 자유 다면 탐색 (faceted) ──
const FACET_AXES = [
  {key:'target', label:'대상', opts:['소상공인','중소기업','창업벤처']},
  {key:'category', label:'분야', opts:['금융','경영','창업','내수']},
  {key:'region', label:'지역', opts:['공통','서울','경기','부산','대구','인천','경북','경남']},
  {key:'purpose', label:'목적', opts:['운전자금','시설개보수','컨설팅','마케팅비','사업화','이자보전','보증지원']},
  {key:'industry', label:'업종', opts:['외식·식품','제조업','IT·디지털','관광업','콘텐츠']},
  {key:'qualification', label:'추가 조건', opts:['청년','중장년','여성기업','장애인기업','사회적기업','소공인']},
];

function facetFilter(facets) {
  // 활성 facet으로 NOTICES 필터 (자유 탐색은 지역=정확히 일치)
  let result = [];
  for (let i=0;i<NOTICES.length;i++){
    const n = NOTICES[i];
    if (n._hidden) continue;
    if (facets.target) { const t=n.target||''; const tk=t.includes('소상공인')?'소상공인':(t.includes('창업')||t.includes('벤처'))?'창업벤처':'중소기업'; if(tk!==facets.target) continue; }
    if (facets.category && n.category!==facets.category) continue;
    if (facets.region && (n.region||'공통')!==facets.region) continue;
    if (facets.purpose && !(n.purposes||[]).includes(facets.purpose)) continue;
    if (facets.industry && !matchesNoticeTerms(n, INDUSTRY_FILTERS[facets.industry])) continue;
    if (facets.qualification && !matchesNoticeTerms(n, QUALIFICATION_FILTERS[facets.qualification])) continue;
    result.push(i);
  }
  return result;
}

function renderFacetPanel() {
  const f = STATE.facets;
  const matched = facetFilter(f);
  // 각 옵션의 건수 = 그 옵션을 추가했을 때 결과 수
  let axesHtml = '';
  for (const ax of FACET_AXES) {
    let chips = '';
    for (const opt of ax.opts) {
      const test = {...f, [ax.key]: f[ax.key]===opt ? null : opt};
      const cnt = facetFilter(test).length;
      const on = f[ax.key]===opt;
      chips += `<button class="facet-chip${on?' on':''}" data-q="__facet:${ax.key}:${opt}">${esc(opt)} <span class="cnt">${cnt}</span></button>`;
    }
    axesHtml += `<div class="facet-axis"><div class="facet-axis-label">${ax.label}</div><div class="facet-chips">${chips}</div></div>`;
  }
  const items = matched.slice(0,3).map(i=>({notice:NOTICES[i], score:0, reasons:[], dl:deadlineBadge(NOTICES[i]), tier:institutionTier(NOTICES[i])}));
  items.sort((a,b)=>a.tier-b.tier);
  STATE.lastResults = matched.map(i=>({notice:NOTICES[i], score:0, reasons:[], dl:deadlineBadge(NOTICES[i]), tier:institutionTier(NOTICES[i])})).sort((a,b)=>a.tier-b.tier);
  const cardsHtml = items.map(r=>renderCard(r)).join('');
  const activeBits = FACET_AXES.filter(ax=>f[ax.key]).map(ax=>f[ax.key]);
  const head = activeBits.length ? `조건: ${activeBits.join(' · ')} → <b>${matched.length}건</b>` : `조건을 누를수록 좁혀져요. 현재 <b>${matched.length}건</b>`;

  const row = document.createElement('div');
  row.className = 'chat-row';
  row.innerHTML = `<div class="avatar bot">🧑‍💼</div><div class="bubble bot">
    <div class="bot-meta"><span class="meta-dot"></span>자유 탐색</div>
    <div class="browse-stat">${head}</div>
    ${axesHtml}
    ${matched.length<=3?cardsHtml:''}
    <div class="followups"><button class="chip" data-q="__facet:show">결과 ${Math.min(matched.length,5)}건 보기</button><button class="chip" data-q="__reset__">처음으로</button></div>
  </div>`;
  row.querySelectorAll('.chip, .facet-chip').forEach(b => b.addEventListener('click', () => doQuery(b.dataset.q)));
  document.getElementById('chatArea').appendChild(row);
  scrollBottom();
}

function toggleFacet(axis, val) {
  if (val === 'show') {
    const items = STATE.lastResults.slice(0,5);
    const cards = items.map(r=>renderCard(r)).join('');
    addBotPanel(`<div class="bot-meta"><span class="meta-dot"></span>탐색 결과</div><div class="bot-narrative">조건에 맞는 ${STATE.lastResults.length}건 중 ${items.length}건이에요.</div>${cards}`, [{label:'조건 더 좁히기',q:'__facet:open2'},{label:'처음으로',q:'__reset__'}]);
    return;
  }
  if (axis === 'open2') { renderFacetPanel(); return; }
  STATE.facets[axis] = STATE.facets[axis]===val ? null : val;
  renderFacetPanel();
}

// ═══════════════════════════════════════════
// MAIN QUERY FLOW — AI 조언자 파이프라인
// ═══════════════════════════════════════════
function doQuery(query) {
  if (_busy) return;
  if (query === '__reset__') { STATE.reset(); location.reload(); return; }

  // 원문 새 탭 열기
  if (query.startsWith('__open:')) {
    const nid = query.slice(7);
    const n = NOTICES.find(x => x.id === nid);
    if (n && n.url) { _officialClicked = true; track('official_click', {id:nid}); window.open(n.url, '_blank', 'noopener'); }
    return;
  }

  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('qInput').value = '';

  // 특수 액션 처리
  if (query === '__deadline__') {
    addUserBubble('마감 임박한 공고 보기');
    _busy = true; setInputEnabled(false); showThinking();
    setTimeout(() => {
      hideThinking(); _busy = false; setInputEnabled(true);
      const sr = search('__deadline__');
      addBotTurn('마감이 가까운 공고를 찾아봤어요.', sr.items, [{label:'🔄 처음부터', q:'__reset__'}]);
    }, 400);
    return;
  }

  // 슬롯 채우기 액션 (칩 클릭)
  if (query.startsWith('__slot:')) {
    const [,slot,value] = query.match(/__slot:(\w+):(.+)/)||[];
    if (slot && value) {
      STATE.slots[slot] = value;
      if (!STATE.filled.includes(slot)) STATE.filled.push(slot);
      addUserBubble(value === '_any' ? '상관없어요' : value);
      processConversation();
      return;
    }
  }

  // 업종·추가 자격은 선택 사항이다. 관련 공고가 있을 때만 원문 표현으로 필터링한다.
  if (query.startsWith('__profile:')) {
    const [,kind,value] = query.match(/__profile:(\w+):(.+)/)||[];
    if (kind && value) {
      STATE.slots.profile = kind === 'skip' ? '_skip' : 'custom';
      if (kind !== 'skip') STATE.slots[kind] = value;
      if (!STATE.filled.includes('profile')) STATE.filled.push('profile');
      addUserBubble(kind === 'skip' ? '조건 없이 추천' : value);
      processConversation();
      return;
    }
  }

  // 이전 질문 (P0-8)
  if (query === '__back') {
    const last = STATE.filled.pop();
    if (last === 'profile') {
      STATE.slots.profile = null;
      STATE.slots.industry = null;
      STATE.slots.qualification = null;
      STATE.slots.businessAge = null;
    } else if (last) {
      STATE.slots[last] = null;
    }
    addUserBubble('← 이전 질문으로');
    processConversation();
    return;
  }

  // 드릴 액션
  if (query === '__more__') { showMoreResults(); return; }
  if (query === '__nationwide__') { STATE.slots.region = '공통'; addUserBubble('공통(중앙정부)만 보기'); processConversation(); return; }
  if (query.startsWith('__switchCat:')) { const c=query.split(':')[1]; STATE.slots.category=c; addUserBubble(c+' 분야 보기'); processConversation(); return; }

  // 시나리오 시드 (보조 진입)
  if (query.startsWith('__seed:')) {
    const cat = query.slice(7);
    const seedMap = {'경영':{category:'경영',need:'컨설팅'}, '수출':{category:'내수',need:'수출'}};
    Object.assign(STATE.slots, seedMap[cat] || {category:cat});
    STATE.phase = 'gathering';
    addUserBubble(cat === '수출' ? '수출 지원 찾기' : '경영·컨설팅 찾기');
    processConversation();
    return;
  }

  // ── 탐색 모드 액션 ──
  if (query === '__browse:ministry') { addUserBubble('부처별 보기'); browseMinistries(); return; }
  if (query === '__browse:region') { addUserBubble('우리 동네 보기'); browseRegions(); return; }
  if (query === '__browse:family') { addUserBubble('지역별 비교'); browseFamilies(); return; }
  if (query.startsWith('__inst:')) { const name = query.slice(7); addUserBubble(name); showInstitution(name); return; }
  if (query.startsWith('__regbrowse:')) { const rg = query.slice(12); addUserBubble(rg + ' 지역'); showRegionOverview(rg); return; }
  if (query.startsWith('__family:')) { const fid = query.slice(9); showFamilyCompare(fid); return; }
  if (query === '__docsearch') { addUserBubble('서류로 찾기'); docSearchMenu(); return; }
  if (query === '__docsort') { addUserBubble('서류 간단한 순'); docSortSimple(); return; }
  if (query.startsWith('__docfilter:')) { const kw = query.slice(12); addUserBubble(kw + ' 필요 공고'); docFilter(kw); return; }
  if (query === '__briefing:menu') { addUserBubble('공고 브리핑'); renderBriefingMenu(); return; }
  if (query === '__briefing:month:overview') { addUserBubble('이번 달 공고 브리핑'); renderMonthlyBriefing('overview'); return; }
  if (query === '__briefing:month:new') { addUserBubble('이번 달 신규 접수 공고'); renderMonthlyBriefing('new'); return; }
  if (query === '__briefing:month:deadline') { addUserBubble('이번 달 마감 예정 공고'); renderMonthlyBriefing('deadline'); return; }
  if (query.startsWith('__briefing:month:cat:')) { const cat=query.slice(21); addUserBubble(`이번 달 ${cat} 공고`); renderMonthlyBriefing('overview',cat); return; }
  if (query.startsWith('__briefing:notice:')) { const id=query.slice(18); addUserBubble('공고 브리핑 보기'); renderNoticeBriefing(NOTICES.find(n=>n.id===id)); return; }
  if (query === '__glossary:menu') { addUserBubble('용어 알아보기'); renderGlossaryMenu(); return; }
  if (query.startsWith('__glossary:')) { const term = query.slice(11); addUserBubble(term); renderGlossaryAnswer(term); return; }
  if (query === '__facet:open') { addUserBubble('자유 탐색'); STATE.mode='explore'; STATE.facets={target:null,region:null,category:null,purpose:null,fundType:null,period:null,industry:null,qualification:null}; renderFacetPanel(); return; }
  if (query === '__facet:show') { toggleFacet('show'); return; }
  if (query === '__facet:open2') { renderFacetPanel(); return; }
  if (query.startsWith('__facet:')) { const rest = query.slice(8); const ci = rest.indexOf(':'); if (ci>0) toggleFacet(rest.slice(0,ci), rest.slice(ci+1)); return; }

  // 월간·특정 공고 브리핑
  if (/(이번\s*달|이번달).*(공고|지원사업|사업).*(브리핑|요약|정리)|이번\s*달\s*브리핑/.test(query)) {
    addUserBubble(query);
    const category = ['금융','경영','창업','내수'].find(c=>query.includes(c)) || null;
    const view = /마감/.test(query) ? 'deadline' : /신규|새로|새\s*공고/.test(query) ? 'new' : 'overview';
    renderMonthlyBriefing(view, category);
    return;
  }
  if (/(공고|사업).*(브리핑|요약|정리|자세히|상세히)|브리핑.*(공고|사업)/.test(query)) {
    const ordinal = noticeOrdinal(query);
    if (ordinal !== null && STATE.lastResults[ordinal]) {
      addUserBubble(query);
      renderNoticeBriefing(STATE.lastResults[ordinal].notice);
      return;
    }
    const candidates = findNoticeBriefingCandidates(query);
    addUserBubble(query);
    if (candidates.length === 1) renderNoticeBriefing(candidates[0].notice);
    else if (candidates.length > 1) renderBriefingCandidates(candidates);
    else renderBriefingMenu();
    return;
  }

  // 용어 질문은 검색 조건으로 오해하지 않고 즉시 설명한다.
  const glossaryTerm = findGlossaryTerm(query);
  if (glossaryTerm && isGlossaryQuestion(query, glossaryTerm)) {
    addUserBubble(query);
    track('glossary_question', {term: glossaryTerm});
    renderGlossaryAnswer(glossaryTerm);
    return;
  }

  // 후속 대화 (현재 결과에 대한 추가 명령) — 슬롯 리셋 없이 처리
  if (handleFollowup(query)) return;

  // 자연어 입력 → 의도 파싱
  if (query === _lastQuery) return;
  _lastQuery = query;
  addUserBubble(query);
  track('search_submitted', {q: query});

  const intent = parseIntent(query);
  // 파싱된 슬롯 merge
  if (intent.target) STATE.slots.target = intent.target;
  if (intent.need) STATE.slots.need = intent.need;
  if (intent.region) STATE.slots.region = intent.region;
  if (intent.category) STATE.slots.category = intent.category;
  if (intent.purpose) STATE.slots.purpose = intent.purpose;
  if (intent.fundType) STATE.slots.fundType = intent.fundType;
  if (intent.profile) STATE.slots.profile = intent.profile;
  if (intent.industry) STATE.slots.industry = intent.industry;
  if (intent.qualification) STATE.slots.qualification = intent.qualification;
  if (intent.businessAge) STATE.slots.businessAge = intent.businessAge;
  STATE.turnCount++;

  processConversation();
}

// 대화 흐름 결정 엔진
function processConversation() {
  const slots = STATE.slots;

  // 슬롯이 부족하면 질문 (gathering)
  const gq = buildGatheringChips(slots);
  if (gq && STATE.turnCount < 3) {
    STATE.phase = 'gathering';
    addBotGathering(gq.question, gq.chips);
    return;
  }

  // 충분하면 추천 (recommending)
  STATE.phase = 'recommending';
  _busy = true; setInputEnabled(false); showThinking();

  setTimeout(() => {
    hideThinking(); _busy = false; setInputEnabled(true);

    const results = matchPolicies(slots);
    STATE.lastResults = results;

    // 결과 없음 → 실패 대응 (P0 실패 화면)
    if (results.length === 0) {
      track('consult_fail', {slots: {...slots}});
      addBotFallback(slots);
      STATE.phase = 'drilling';
      return;
    }

    const groups = groupResults(slots, results);
    const narrative = buildAdvisoryNarrative(slots, results);
    const badges = renderSlotBadges(slots);
    const ap = (slots.purpose && slots.purpose !== '_any') ? slots.purpose : null;

    // 그룹별 카드 HTML
    let body = '';
    if (groups.strong.length) {
      body += `<div class="group-head g1">✅ 조건에 잘 맞는 추천 <span class="group-sub">${groups.strong.length}건</span></div>`;
      body += groups.strong.map(r => renderCard(r, ap)).join('');
      if (groups.strong.length >= 2) {
        body += `<details class="compare-toggle"><summary>📊 추천 ${groups.strong.length}건 한눈에 비교</summary>${renderCompareTable(groups.strong)}</details>`;
      }
    }
    if (groups.check.length) {
      body += `<div class="group-head g2">🔎 일부 조건을 확인해야 하는 추천 <span class="group-sub">${groups.check.length}건</span></div>`;
      body += groups.check.map(r => renderCard(r, ap)).join('');
    }
    if (groups.related.length) {
      body += `<div class="group-head g3">💡 함께 검토할 만한 관련 사업 <span class="group-sub">조건을 조금 넓혔어요</span></div>`;
      body += groups.related.map(r => renderCard(r, ap)).join('');
    }
    body += `<div class="final-note">ℹ️ 신청 가능 여부와 최신 조건은 공식 공고에서 최종 확인해 주세요. AI가 공고문을 요약한 결과입니다.</div>`;

    track('recommend_shown', {count: results.length, strong: groups.strong.length, slots: {...slots}});
    const drillChips = buildDrillingChips(slots, results);
    addBotAdvised(narrative, badges, body, drillChips);
    updateContextBar();
    STATE.phase = 'drilling';
    document.getElementById('qInput').blur();
  }, 400);
}

// 슬롯 질문 턴 렌더 (진행상태 + 이전/처음)
function addBotGathering(question, chips) {
  updateContextBar();
  const slotKey = chips[0]?.slot;
  // 진행 단계 계산 (금융이면 4단계, 아니면 3단계)
  const seq = STATE.slots.category === '금융' ? ['category','fundType','purpose','region'] : ['category','purpose','region'];
  const total = seq.length;
  const step = Math.max(1, seq.indexOf(slotKey) + 1);
  const progress = slotKey && seq.includes(slotKey) ? `<span class="gather-progress">${step}/${total}</span>` : '';

  const row = document.createElement('div');
  row.className = 'chat-row';
  let chipsHtml = chips.map(c =>
    `<button class="chip" data-q="${esc(c.q || `__slot:${c.slot}:${c.value}`)}">${esc(c.label)}</button>`
  ).join('');
  // 이전/처음 (한 단계라도 채웠으면 '이전' 노출)
  let navHtml = '';
  if (STATE.filled.length > 0) navHtml += `<button class="chip chip-nav" data-q="__back">← 이전 질문</button>`;
  navHtml += `<button class="chip chip-nav" data-q="__reset__">처음부터</button>`;

  row.innerHTML = `
    <div class="avatar bot">🧑‍💼</div>
    <div class="bubble bot">
      <div class="bot-meta"><span class="meta-dot"></span>확인 중 ${progress}</div>
      <div class="gather-q">${esc(question)}</div>
      <div class="slot-chips">${chipsHtml}</div>
      <div class="slot-chips" style="margin-top:8px">${navHtml}</div>
    </div>`;
  row.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => doQuery(btn.dataset.q));
  });
  document.getElementById('chatArea').appendChild(row);
  scrollBottom(true);
}

// ── P1-1: 후속 대화 (현재 결과에 대한 추가 명령) ──
function handleFollowup(query) {
  if (STATE.phase !== 'drilling' || !STATE.lastResults.length) return false;
  const q = query.replace(/\s/g, '');
  const ap = (STATE.slots.purpose && STATE.slots.purpose !== '_any') ? STATE.slots.purpose : null;
  const ordinal = noticeOrdinal(query);

  // 목록에서 특정 공고를 골라 신청 브리핑
  if (ordinal !== null && STATE.lastResults[ordinal] && /(브리핑|자세|상세|요약|설명|서류|준비|문의|신청방법)/.test(query)) {
    addUserBubble(query); track('followup', {type:'notice_briefing', ordinal});
    renderNoticeBriefing(STATE.lastResults[ordinal].notice);
    return true;
  }
  if (STATE.lastResults.length === 1 && /(자세|상세|서류|준비|문의|신청방법)/.test(query)) {
    addUserBubble(query); track('followup', {type:'notice_briefing_single'});
    renderNoticeBriefing(STATE.lastResults[0].notice);
    return true;
  }
  if (/(어떤|무슨).*(공고|사업).*(브리핑|자세|요약)|공고.*골라/.test(query)) {
    addUserBubble(query); track('followup', {type:'notice_briefing_choose'});
    renderBriefingCandidates(STATE.lastResults);
    return true;
  }

  // 특정 공고에 대한 토픽 자유 질의 (평가기준/우대/제외/사후관리/규모)
  const topicMap = [
    [/평가|선정|심사|선발/, '평가·선정'],
    [/우대|가점|가산/, '우대·가점'],
    [/제외|제한|안되|못받|불가/, '지원 제외'],
    [/사후|정산|협약/, '사후관리·정산'],
    [/규모|한도|얼마|최대/, '지원 규모'],
  ];
  const topicHit = topicMap.find(([re]) => re.test(query));
  if (topicHit) {
    const idx = ordinal !== null ? ordinal : (STATE.lastResults.length === 1 ? 0 : 0);
    const nid = STATE.lastResults[idx]?.notice.id;
    if (nid) { askAboutNotice(nid, topicHit[1]); return true; }
  }

  // 서류 적은/간단한 순
  if (/(서류|준비물).*(적|간단|쉬|간편)|간단한것|서류적은/.test(q)) {
    addUserBubble(query); track('followup', {type:'docs_simple'});
    const sorted = [...STATE.lastResults].sort((a,b)=>cleanDocs(a.notice.documents).length - cleanDocs(b.notice.documents).length);
    renderFilteredResults('📄 서류가 간단한 순으로 정리했어요', sorted.slice(0,5), ap);
    return true;
  }
  // 온라인 접수 가능한 공고만
  if (/온라인.*(접수|신청|가능|만)|비대면.*(접수|신청|만)/.test(q)) {
    addUserBubble(query); track('followup', {type:'online_only'});
    const online = STATE.lastResults.filter(r=>r.notice.online);
    renderFilteredResults('💻 온라인으로 접수 가능한 공고만 모았어요', online.slice(0,5), ap);
    return true;
  }
  // 청년·여성기업 등 추가 자격으로 현재 결과 좁히기
  const qual = Object.keys(QUALIFICATION_FILTERS).find(k => query.includes(k));
  if (qual && /(대상|조건|해당|만|보여|찾아|골라)/.test(query)) {
    addUserBubble(query); track('followup', {type:'qualification_only', qualification:qual});
    const matched = STATE.lastResults.filter(r=>matchesNoticeTerms(r.notice, QUALIFICATION_FILTERS[qual]));
    renderFilteredResults(`👤 ${qual} 관련 공고만 모았어요`, matched.slice(0,5), ap);
    return true;
  }
  // 현재 결과를 분야로 좁히기
  const category = ['금융','경영','창업','내수'].find(c=>query.includes(c));
  if (category && /(만|분야|보여|찾아|골라)/.test(query)) {
    addUserBubble(query); track('followup', {type:'category_only', category});
    const matched = STATE.lastResults.filter(r=>r.notice.category === category);
    renderFilteredResults(`${category} 분야 공고만 모았어요`, matched.slice(0,5), ap);
    return true;
  }
  // 지원금 큰 순
  if (/(지원금|금액|혜택).*(큰|많|높)|많이주|제일많/.test(q)) {
    addUserBubble(query); track('followup', {type:'amount_desc'});
    const sorted = [...STATE.lastResults].sort((a,b)=>amountValue(b.notice.amount)-amountValue(a.notice.amount));
    renderFilteredResults('💰 지원금이 큰 순으로 정리했어요', sorted.slice(0,5), ap);
    return true;
  }
  // 마감 임박한 것만
  if (/마감.*(임박|가까|급|곧)|곧마감|급한것/.test(q)) {
    addUserBubble(query); track('followup', {type:'deadline'});
    const today = new Date(); today.setHours(0,0,0,0);
    const withDl = STATE.lastResults.map(r=>{
      const end = parseDeadline((r.notice.period||'').split('~').pop());
      return {r, end};
    }).filter(x=>x.end && x.end>=today).sort((a,b)=>a.end-b.end).map(x=>x.r);
    if (!withDl.length) { addBotPanel('<div class="bot-narrative">이 결과 중에는 마감일이 명시된 공고가 없어요. 대부분 상시·예산소진형이에요.</div>', [{label:'처음부터',q:'__reset__'}]); return true; }
    renderFilteredResults('⏰ 마감이 가까운 순으로 정리했어요', withDl.slice(0,5), ap);
    return true;
  }
  // 다른 지역 추가/비교 ("경기도도", "서울 말고 경기")
  const REGS = ['서울','부산','대구','인천','광주','대전','울산','세종','경기','강원','충북','충남','전북','전남','경북','경남','제주'];
  const found = REGS.find(rg => query.includes(rg));
  if (found && /비교|도\b|말고|추가|는|은|에서|지역/.test(query)) {
    addUserBubble(query); track('followup', {type:'region_switch', region:found});
    STATE.slots.region = found;
    if (!STATE.filled.includes('region')) STATE.filled.push('region');
    processConversation();
    return true;
  }
  return false;
}

// 필터링/정렬된 결과를 단순 목록으로 렌더 (후속 응답용)
function renderFilteredResults(title, items, ap) {
  if (!items.length) { addBotPanel('<div class="bot-narrative">해당하는 공고가 없어요.</div>', [{label:'처음부터',q:'__reset__'}]); return; }
  STATE.lastResults = items;
  STATE.phase = 'drilling';
  const cards = items.map(r => renderCard(r, ap)).join('');
  const chips = [
    {label:'📌 첫 번째 공고 브리핑', q:'첫 번째 공고 브리핑'},
    {label:'💻 온라인 접수만', q:'온라인 접수만 보여줘'},
    {label:'📄 서류 간단한 순', q:'서류 간단한 순'},
    {label:'💰 지원금 큰 순', q:'지원금 큰 순'},
    {label:'⏰ 마감 임박 순', q:'마감 임박한 것만'},
  ];
  addBotPanel(`<div class="bot-meta"><span class="meta-dot"></span>${esc(title.replace(/^[^\s]+\s/,'추천 정렬'))}</div><div class="bot-narrative">${esc(title)}</div>${cards}`, chips);
}

// 결과 없음 → 실패 대응 (막다른 화면 금지)
function addBotFallback(slots) {
  const relaxChips = [];
  if (slots.purpose && slots.purpose !== '_any') relaxChips.push({label:`용도(${slots.purpose}) 조건 빼기`, q:'__slot:purpose:_any'});
  if (slots.fundType && slots.fundType !== '_any') relaxChips.push({label:`융자/보조금 조건 빼기`, q:'__slot:fundType:_any'});
  if (slots.industry && slots.industry !== '_any') relaxChips.push({label:`업종(${slots.industry}) 조건 빼기`, q:'__slot:industry:_any'});
  if (slots.qualification && slots.qualification !== '_any') relaxChips.push({label:`추가 조건(${slots.qualification}) 빼기`, q:'__slot:qualification:_any'});
  if (slots.businessAge && slots.businessAge !== '_any') relaxChips.push({label:`${slots.businessAge} 조건 빼기`, q:'__slot:businessAge:_any'});
  if (slots.region && slots.region !== '공통') relaxChips.push({label:'공통(중앙정부)만 보기', q:'__nationwide__'});
  relaxChips.push({label:'🎛️ 자유 탐색', q:'__facet:open'});
  relaxChips.push({label:'🔄 처음부터', q:'__reset__'});
  const inner = `<div class="bot-meta"><span class="meta-dot" style="background:var(--down)"></span>결과 없음</div>
    <div class="bot-narrative">아쉽게도 지금 조건에 딱 맞는 공고를 찾지 못했어요. 아래에서 조건을 하나씩 넓혀보시거나, 직접 둘러보세요.</div>
    <div class="final-note">📞 막막하시면 <b>중소기업 통합콜센터 1357</b>(평일 9~18시)로 문의하거나, <a href="https://www.bizinfo.go.kr" target="_blank" rel="noopener">기업마당 공식 검색</a>에서 직접 찾아보실 수 있어요.</div>`;
  addBotPanel(inner, relaxChips);
}

// 추천 턴 렌더 (그룹 + 비교표 포함)
function addBotAdvised(narrative, badges, bodyHtml, drillChips) {
  const row = document.createElement('div');
  row.className = 'chat-row';
  let chipsHtml = drillChips.map(c => {
    let q = c.q || '';
    if (c.action === 'reset') q = '__reset__';
    else if (c.action === 'deadline') q = '__deadline__';
    else if (c.action === 'more') q = '__more__';
    else if (c.action === 'nationwide') q = '__nationwide__';
    else if (c.action === 'switchCat') q = `__switchCat:${c.value}`;
    else q = c.label;
    return `<button class="chip" data-q="${esc(q)}">${esc(c.label)}</button>`;
  }).join('');

  row.innerHTML = `
    <div class="avatar bot">🧑‍💼</div>
    <div class="bubble bot">
      <div class="bot-meta"><span class="meta-dot"></span>추천 완료 <span class="meta-badge">${esc(STATE.slots.category||'')}</span></div>
      ${badges}
      <div class="bot-narrative" style="white-space:pre-line">${esc(narrative)}</div>
      ${bodyHtml}
      <div class="followups">${chipsHtml}</div>
    </div>`;
  row.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => doQuery(btn.dataset.q));
  });
  row.querySelectorAll('.slot-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      STATE.slots[btn.dataset.slot] = null;
      addUserBubble(btn.dataset.slot + ' 조건 해제');
      processConversation();
    });
  });
  document.getElementById('chatArea').appendChild(row);
  scrollBottom();
}

function showMoreResults() {
  const more = STATE.lastResults.slice(3, 8);
  if (!more.length) return;
  addUserBubble('더 보기');
  addBotTurn(`${more.length}건을 더 보여드릴게요.`, more, [{label:'🔄 처음부터', q:'__reset__'}]);
}

// #14: 입력 활성/비활성
function setInputEnabled(on) {
  document.getElementById('qInput').disabled = !on;
  document.getElementById('sendBtn').disabled = !on;
}

function submitFromInput() {
  const v = document.getElementById('qInput').value.trim();
  if (!v) return; // #12: 빈 입력 차단
  doQuery(v);
}

document.getElementById('qInput').addEventListener('keydown', e => { if(e.key==='Enter') submitFromInput(); });
document.getElementById('sendBtn').addEventListener('click', submitFromInput);

init();
</script>
</body>
</html>
